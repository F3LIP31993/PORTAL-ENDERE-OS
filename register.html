<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro | Portal MDU</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-header">
        <h1>Cadastro</h1>
        <p class="login-subtitle">Solicite acesso ao portal</p>
      </div>

      <form class="login-form" onsubmit="register(event)">
        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Digite seu nome" required>
          <span class="form-icon">📝</span>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="Digite seu e-mail" required>
          <span class="form-icon">📧</span>
        </div>

        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" placeholder="Escolha um usuário" required>
          <span class="form-icon">👤</span>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
          <span class="form-icon">🔒</span>
        </div>

        <div class="form-group">
          <label for="confirmSenha">Confirmar senha</label>
          <input type="password" id="confirmSenha" placeholder="Confirme a senha" required>
          <span class="form-icon">🔒</span>
        </div>

        <button type="submit" class="btn-login">Enviar solicitação</button>

        <span id="erro" class="erro"></span>
      </form>

      <div class="login-extra">
        <p class="register-text">
          Já tem conta? <a href="login.html">Faça login aqui</a>
        </p>
      </div>

      <div class="login-footer">
        <a href="#" class="forgot-password">Seu acesso será revisado em até 24h</a>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
