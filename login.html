<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="portal-api-base" content="">
  <title>Login | Portal MDU</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-header">
        <h1>Portal MDU</h1>
        <p class="login-subtitle">Acesso ao sistema interno</p>
      </div>

      <form class="login-form" onsubmit="login(event)">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" placeholder="Digite seu usuário" required>
          <span class="form-icon">👤</span>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
          <span class="form-icon">🔒</span>
        </div>

        <button type="submit" class="btn-login">Entrar</button>

        <span id="erro" class="erro"></span>
      </form>

      <div class="login-extra">
        <p class="register-text">
          Ainda não tem acesso? <a href="register.html">Cadastre-se aqui</a>
        </p>
      </div>

      <div class="login-footer">
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
      </div>
    </div>
  </div>

  <script src="js/api-config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
