services:
  - type: web
    name: portal-enderecos-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
    healthCheckPath: /api/config
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "false"
      - key: PORTAL_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: CORS_ALLOWED_ORIGINS
        value: https://f3lip31993.github.io,http://localhost:5000
      - key: DATABASE_URL
        fromDatabase:
          name: portal-enderecos-db
          property: connectionString

databases:
  - name: portal-enderecos-db
    plan: free
    databaseName: portal_enderecos
    user: portal_enderecos_user
